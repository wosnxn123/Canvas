name: Build Canvas

on:
  push:
    branches: ["main", "pre-merger/26.2"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      JAVA_TOOL_OPTIONS: "-Xmx4G"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            .gradle/caches
            canvas-server/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Apply patches
        run: ./gradlew applyAllPatches --no-configuration-cache

      - name: Build paperclip jar
        run: ./gradlew :canvas-server:createPaperclipJar --no-configuration-cache

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: canvas-paperclip
          path: canvas-server/build/libs/canvas-paperclip-*.jar

      - name: Create Release
        if: github.ref_name == 'main' || github.ref_name == 'pre-merger/26.2'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}-${{ github.sha }}
          name: Canvas ${{ github.ref_name }} build
          files: canvas-server/build/libs/canvas-paperclip-*.jar
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
